<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>他律・自律傾向 自己診断</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 560px;
      width: 100%;
      padding: 40px 36px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #718096;
      margin-bottom: 32px;
    }

    /* Progress bar */
    .progress-wrap {
      background: #e2e8f0;
      border-radius: 99px;
      height: 6px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .step-label {
      font-size: 0.8rem;
      color: #a0aec0;
      margin-bottom: 8px;
    }

    /* Question */
    .question {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: #f7fafc;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.95rem;
      color: #2d3748;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .option-btn:hover {
      border-color: #667eea;
      background: #ebf4ff;
      color: #434190;
    }

    /* Result */
    .result {
      text-align: center;
    }

    .result-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }

    .result-type {
      font-size: 1.4rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 8px;
    }

    .result-label {
      display: inline-block;
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 99px;
      padding: 4px 14px;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    .result-desc {
      font-size: 0.95rem;
      color: #4a5568;
      line-height: 1.8;
      margin-bottom: 28px;
      text-align: left;
    }

    .retry-btn {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .retry-btn:hover {
      opacity: 0.85;
    }

    /* Definition section */
    .definition {
      background: #f7fafc;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 24px;
      text-align: left;
    }

    .definition-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #a0aec0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .definition-item {
      margin-bottom: 10px;
    }

    .definition-item:last-child {
      margin-bottom: 0;
    }

    .definition-term {
      font-size: 0.85rem;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 2px;
    }

    .definition-body {
      font-size: 0.83rem;
      color: #718096;
      line-height: 1.7;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Quiz section -->
    <div id="quiz-section">
      <h1>他律・自律 簡易診断</h1>
      <p class="subtitle">仕事の時間・判断・納得感に関する3問に答えて、あなたの傾向を確認しましょう。</p>

      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
      </div>

      <p class="step-label" id="step-label">質問 1 / 3</p>
      <p class="question" id="question-text"></p>
      <div class="options" id="options-wrap"></div>
    </div>

    <!-- Result section -->
    <div id="result-section" class="result hidden">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-type" id="result-type"></div>
      <div class="result-label" id="result-label"></div>
      <p class="result-desc" id="result-desc"></p>

      <div class="definition">
        <p class="definition-title">この診断の考え方</p>
        <div class="definition-item">
          <p class="definition-term">他律とは</p>
          <p class="definition-body">上司、会議、依頼、周囲の都合によって時間や行動が決まりやすい状態。</p>
        </div>
        <div class="definition-item">
          <p class="definition-term">自律とは</p>
          <p class="definition-body">自分で仕事を選び、時間配分や優先順位を握れている状態。</p>
        </div>
        <div class="definition-item">
          <p class="definition-term">自律の判断基準</p>
          <p class="definition-body">気分ではなく、複数の選択肢を比較して「期待値」で判断している状態。</p>
        </div>
      </div>

      <button class="retry-btn" onclick="restart()">もう一度診断する</button>
    </div>
  </div>

  <script>
    // score: 1=他律, 2=中間, 3=自律
    const questions = [
      {
        text: "あなたの1日は、どのように埋まることが多いですか？",
        options: [
          { label: "会議や依頼対応で気づくと埋まっている", value: 1 },
          { label: "半分は自分で決めるが、半分は周囲に左右される", value: 2 },
          { label: "優先順位を自分で決めて時間を使っている", value: 3 },
        ],
      },
      {
        text: "新しい仕事や依頼が来たとき、どう判断することが多いですか？",
        options: [
          { label: "基本的に断りづらく、そのまま引き受ける", value: 1 },
          { label: "重要そうなら受けるが、深くは比較しない", value: 2 },
          { label: "他の選択肢と比べて期待値を考えて決める", value: 3 },
        ],
      },
      {
        text: "その仕事をやる理由を後から振り返ると、どれに近いですか？",
        options: [
          { label: "誰かに求められたから", value: 1 },
          { label: "必要だと思ったから", value: 2 },
          { label: "自分で意味と優先順位を判断したから", value: 3 },
        ],
      },
    ];

    const results = {
      low: {
        icon: "🤝",
        type: "他律寄り",
        label: "GUIDED",
        desc: "上司・会議・依頼など外部要因に時間や行動が左右されやすい状態です。周囲のニーズに応える誠実さは強みですが、自分の時間を自分で握れていない可能性があります。まずは1日のうち「自分で選んだ仕事」と「求められた仕事」を分けて記録してみることが、変化の第一歩になるでしょう。",
      },
      mid: {
        icon: "⚖️",
        type: "中間型",
        label: "BALANCED",
        desc: "一部は自分で選べているが、まだ周囲の流れにも大きく影響されている状態です。自律の芽はすでにあります。次のステップは、仕事を受ける際に「他の選択肢と比較して期待値を判断する」習慣を意識的に取り入れることです。小さな意思決定の積み重ねが、自律度を底上げしていきます。",
      },
      high: {
        icon: "🧭",
        type: "自律寄り",
        label: "AUTONOMOUS",
        desc: "自分で仕事の優先順位を決め、選択肢を比較しながら時間を使えている状態です。気分ではなく「期待値」で判断できていることが、この傾向の核心です。引き続き、自分の判断基準を言語化・更新し続けることで、より高い成果と納得感のある仕事ができるようになるでしょう。",
      },
    };

    let currentStep = 0;
    const answers = [];

    function renderQuestion() {
      const q = questions[currentStep];
      document.getElementById("step-label").textContent = `質問 ${currentStep + 1} / ${questions.length}`;
      document.getElementById("question-text").textContent = q.text;
      document.getElementById("progress-bar").style.width = `${(currentStep / questions.length) * 100}%`;

      const wrap = document.getElementById("options-wrap");
      wrap.innerHTML = "";
      q.options.forEach((opt) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt.label;
        btn.addEventListener("click", () => selectAnswer(opt.value));
        wrap.appendChild(btn);
      });
    }

    function selectAnswer(value) {
      answers.push(value);
      currentStep++;
      if (currentStep < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById("quiz-section").classList.add("hidden");
      const resultSection = document.getElementById("result-section");
      resultSection.classList.remove("hidden");

      // Score: 3問合計 3-4=他律, 5-7=中間, 8-9=自律
      const total = answers.reduce((sum, v) => sum + v, 0);
      const key = total <= 4 ? "low" : total <= 7 ? "mid" : "high";
      const r = results[key];

      document.getElementById("result-icon").textContent = r.icon;
      document.getElementById("result-type").textContent = r.type;
      document.getElementById("result-label").textContent = r.label;
      document.getElementById("result-desc").textContent = r.desc;
      document.getElementById("progress-bar").style.width = "100%";
    }

    function restart() {
      currentStep = 0;
      answers.length = 0;
      document.getElementById("result-section").classList.add("hidden");
      document.getElementById("quiz-section").classList.remove("hidden");
      renderQuestion();
    }

    // Init
    renderQuestion();
  </script>
</body>
</html>
